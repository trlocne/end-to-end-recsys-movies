        parameters:
          - name: job-name
          - name: image
          - name: num-workers
          - name: args
          - name: entrypoint
            value: "python /app/train_gnn.py"
      resource:
        action: create
        successCondition: status.succeeded > 0
        failureCondition: status.failed > 0
        manifest: |
          apiVersion: ray.io/v1
          kind: RayJob
          metadata:
            name: {{inputs.parameters.job-name}}
          spec:
            activeDeadlineSeconds: 86400
            backoffLimit: 0
            entrypoint: sh -c "{{inputs.parameters.entrypoint}} {{inputs.parameters.args}}"
            shutdownAfterJobFinishes: true
            ttlSecondsAfterFinished: 90
            rayClusterSpec:
