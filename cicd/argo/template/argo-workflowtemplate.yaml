                            name: gcs-server
                          - containerPort: 8265
                            name: dashboard
                          - containerPort: 10001
                            name: client
              workerGroupSpecs:
                - replicas: {{inputs.parameters.num-workers}}
                  groupName: train-group
                  rayStartParams:
                    object-store-memory: '1610612736' # 1.5Gi

                  template:
                    spec:
                      nodeSelector:
                        kubernetes.io/os: linux
                        kubernetes.io/arch: amd64
                        nvidia.com/gpu: "true"
                      tolerations:
                        - key: CriticalAddonsOnly
                          operator: Exists
                          effect: NoSchedule
                        - key: nvidia.com/gpu
                          operator: Exists
                          effect: NoSchedule
                      containers:
                        - name: ray-worker
                          image: {{inputs.parameters.image}}
