                    tolerations:
                      - key: CriticalAddonsOnly
                        operator: Exists
                        effect: NoSchedule
                    containers:
                      - name: ray-head
                        image: {{inputs.parameters.image}}
                        imagePullPolicy: Always
                        env:
                          - name: MALLOC_CONF
                            value: "background_thread:false"
                          - name: OMP_NUM_THREADS
                            value: "1"
                        resources:
                          limits:
                            cpu: "{{workflow.parameters.cpu-limit-head}}"
                            memory: "{{workflow.parameters.memory-limit-head}}"
