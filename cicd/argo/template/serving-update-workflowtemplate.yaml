  # Template: Update Serving Config (S3).
  # Reads serving_config.yaml from S3, updates fields, writes back. Also writes an
  # immutable deployment manifest. Pod restart is handled separately by step10
  # (kubectl rollout restart) so the serving Deployment picks up the new config.
  - name: update-serving-config
    inputs:
      parameters:
      - name: registry
        value: "trlocne204"
      - name: serving-config-path
      - name: bundle-version
      - name: gnn-run-id
      - name: reranker-run-id
      - name: reranker-version
      - name: reranker-input-dim
      - name: gnn-embed-dim
      - name: gnn-num-layers
      - name: embeddings-path
      - name: movie-collection
      - name: feature-file
      - name: data-prep-path
      - name: s3-base-path
    script:
      image: python:3.11-slim
      command: ["python"]
      source: |
        import subprocess, sys
        subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "boto3", "pyyaml"])

        import yaml
        import json
        import boto3
        from datetime import datetime, timezone

        s3_config_path = "{{inputs.parameters.serving-config-path}}"
        bundle_version = "{{inputs.parameters.bundle-version}}"
        gnn_run_id = "{{inputs.parameters.gnn-run-id}}"
        reranker_run_id = "{{inputs.parameters.reranker-run-id}}"
        reranker_version = "{{inputs.parameters.reranker-version}}"
        gnn_embed_dim = "{{inputs.parameters.gnn-embed-dim}}"
        gnn_num_layers = "{{inputs.parameters.gnn-num-layers}}"
        embeddings_path = "{{inputs.parameters.embeddings-path}}"
        movie_collection = "{{inputs.parameters.movie-collection}}"
        feature_file = "{{inputs.parameters.feature-file}}"
        data_prep_path = "{{inputs.parameters.data-prep-path}}"
        s3_base_path = "{{inputs.parameters.s3-base-path}}"

        s3 = boto3.client("s3")

        def _parse_s3(s3_url):
            parts = s3_url.replace("s3://", "").split("/", 1)
            return parts[0], parts[1] if len(parts) > 1 else ""

        cfg_bucket, cfg_key = _parse_s3(s3_config_path)
        try:
            obj = s3.get_object(Bucket=cfg_bucket, Key=cfg_key)
            config = yaml.safe_load(obj["Body"].read().decode("utf-8")) or {}
        except s3.exceptions.NoSuchKey:
            print("WARNING: serving_config.yaml not found in S3, starting from empty config.")
            config = {}

        now = datetime.now(timezone.utc).isoformat()

        config.setdefault("models", {})
        config["models"]["bundle_version"] = bundle_version
        config["models"]["gnn_run_id"] = gnn_run_id
        config["models"]["reranker_run_id"] = reranker_run_id
        config["models"]["reranker_version"] = reranker_version
        config["models"]["reranker_input_dim"] = int("{{inputs.parameters.reranker-input-dim}}")
        config["models"]["gnn_embed_dim"] = int(gnn_embed_dim)
        config["models"]["gnn_num_layers"] = int(gnn_num_layers)

        config.setdefault("embeddings", {})
        config["embeddings"]["user_emb"] = f"{embeddings_path}/user_embeddings.parquet"
        config["embeddings"]["item_emb"] = f"{embeddings_path}/movie_embeddings.parquet"
        config["embeddings"]["last_refresh_time"] = now

        config.setdefault("milvus", {})
        config["milvus"]["movie_collection"] = movie_collection

        config.setdefault("training_lineage", {})
        config["training_lineage"]["feature_file"] = feature_file
        config["training_lineage"]["data_prep_path"] = data_prep_path

        s3.put_object(
            Bucket=cfg_bucket,
            Key=cfg_key,
            Body=yaml.dump(config, default_flow_style=False),
            ContentType="application/x-yaml",
        )
        print(f"serving_config.yaml updated at s3://{cfg_bucket}/{cfg_key}")
        print(f"Bundle v{bundle_version} | embeddings: {embeddings_path}")

        manifest = {
            "deployment_time": now,
            "bundle_version": bundle_version,
            "gnn_run_id": gnn_run_id,
            "reranker_run_id": reranker_run_id,
            "feature_file": feature_file,
            "data_prep_path": data_prep_path,
            "embeddings_path": embeddings_path,
        }
        try:
            base_bucket, base_prefix = _parse_s3(s3_base_path)
            ts = datetime.now(timezone.utc).strftime("%Y%m%dT%H%M%SZ")
            manifest_key = f"{base_prefix}/deployments/{ts}_manifest.json".lstrip("/")
            s3.put_object(
                Bucket=base_bucket,
                Key=manifest_key,
                Body=json.dumps(manifest, indent=2),
                ContentType="application/json",
            )
            print(f"Deployment manifest written to s3://{base_bucket}/{manifest_key}")
        except Exception as e:
            print(f"WARNING: failed to write deployment manifest: {e}")
      envFrom:
        - secretRef: { name: aws-creds }

