  - name: rollout-serving-triton-deploy
    inputs:
      parameters:
      - name: registry
        value: "trlocne204"
      - name: serving-namespace
      - name: serving-deployment
      - name: onnx-path
      - name: gnn-embed-dim
      - name: use-gpu-triton
    script:
      image: python:3.11-slim
      command: ["bash", "-c"]
      source: |
        set -eu
        apt-get update -qq && apt-get install -y -qq curl ca-certificates
        pip install -q boto3
        KUBECTL_VER=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
        curl -fsSLo /usr/local/bin/kubectl \
          "https://dl.k8s.io/release/${KUBECTL_VER}/bin/linux/amd64/kubectl"
        chmod +x /usr/local/bin/kubectl

        USE_GPU="{{inputs.parameters.use-gpu-triton}}"
        if [ "${USE_GPU}" = "true" ]; then
          TRITON_APP_LABEL="triton-server"
        else
          TRITON_APP_LABEL="triton-server-cpu"
        fi
        TRITON_NS="serving"

        python3 - <<'PYEOF'
        import os
        import boto3
        from botocore.exceptions import ClientError

        onnx_path = os.environ["ONNX_PATH"]
        if not onnx_path or not onnx_path.startswith("s3://"):
            print("[WARN] ONNX_PATH not set or invalid, skipping Triton model update")
            raise SystemExit(0)
        parsed = onnx_path.replace("s3://", "").split("/")
        bucket, key = parsed[0], "/".join(parsed[1:])
        dst = "/tmp/reranker.onnx"
        s3 = boto3.client("s3")
        try:
            s3.head_object(Bucket=bucket, Key=key)
        except ClientError as e:
            code = e.response.get("Error", {}).get("Code", "")
            if code in ("404", "NoSuchKey", "NotFound"):
                print(f"[WARN] ONNX model not found at s3://{bucket}/{key}, skipping Triton update")
                raise SystemExit(0)
            raise
        s3.download_file(bucket, key, dst)
        print(f"[INFO] downloaded s3://{bucket}/{key}")

        def fetch_if_present(remote_key: str, local_path: str) -> bool:
            try:
                s3.head_object(Bucket=bucket, Key=remote_key)
            except ClientError as e:
                code = e.response.get("Error", {}).get("Code", "")
                if code in ("404", "NoSuchKey", "NotFound"):
                    return False
                raise
            s3.download_file(bucket, remote_key, local_path)
            print(f"[INFO] downloaded s3://{bucket}/{remote_key} -> {local_path}")
            return True

        fetch_if_present(key + ".data", "/tmp/" + os.path.basename(key + ".data"))

        g_ed = int(os.environ.get("GNN_EMBED_DIM", "128"))
        feature_dim = 8 * g_ed + 32
        L, R = chr(123), chr(125)
        inp_line = f'input [{L} name: "input" data_type: TYPE_FP32 dims: [ {feature_dim} ] {R}]'
        print(f"[INFO] reranker config.pbtxt input feature_dim={feature_dim} (8*gnn_embed_dim+32)")

        lines = [
            'name: "reranker"',
            'backend: "onnxruntime"',
            'max_batch_size: 512',
            inp_line,
            'output [{ name: "output" data_type: TYPE_FP32 dims: [ 1 ] }]',
            'dynamic_batching { preferred_batch_size: [ 32, 64, 128 ] max_queue_delay_microseconds: 500 }',
        ]
        out_cfg = "/tmp/reranker-config.pbtxt"
        with open(out_cfg, "w") as f:
            f.write("\n".join(lines) + "\n")
        print(f"[INFO] wrote {out_cfg}")
        PYEOF

        NS="{{inputs.parameters.serving-namespace}}"
        DEPLOY="{{inputs.parameters.serving-deployment}}"
        kubectl rollout restart "deployment/${DEPLOY}" -n "${NS}"
        kubectl rollout status "deployment/${DEPLOY}" -n "${NS}" --timeout=300s

        TRITON_POD=$(kubectl get pod -n "${TRITON_NS}" -l "app=${TRITON_APP_LABEL}" \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

        if [ -z "${TRITON_POD}" ]; then
          echo "[WARN] No running pod found for app=${TRITON_APP_LABEL} in ns=${TRITON_NS} — skipping Triton deploy"
          exit 0
        fi

        echo "[INFO] deploying to Triton pod: ${TRITON_POD}"
        kubectl cp /tmp/reranker.onnx "${TRITON_NS}/${TRITON_POD}:/models/reranker/1/model.onnx"
        for f in /tmp/reranker.onnx.data; do
          [ -f "$f" ] && kubectl cp "$f" "${TRITON_NS}/${TRITON_POD}:/models/reranker/1/$(basename "$f")"
        done
        kubectl cp /tmp/reranker-config.pbtxt "${TRITON_NS}/${TRITON_POD}:/models/reranker/config.pbtxt"
        kubectl exec -n "${TRITON_NS}" "${TRITON_POD}" -- \
          curl -fsS -X POST http://localhost:8002/v2/repository/models/reranker/load
        echo "[INFO] Triton model reloaded successfully"
      env:
        - name: ONNX_PATH
          value: "{{inputs.parameters.onnx-path}}"
        - name: GNN_EMBED_DIM
          value: "{{inputs.parameters.gnn-embed-dim}}"
      envFrom:
        - secretRef: { name: aws-creds }

  - name: cleanup-collections
    inputs:
      parameters:
      - name: registry
        value: "trlocne204"
      - name: milvus-uri
      - name: milvus-token
      - name: retention-days
    script:
      image: "{{inputs.parameters.registry}}/indexing:latest"
      command: ["python"]
      source: |
        import sys
        from pymilvus import connections, utility
        from datetime import datetime, timedelta
        import re

        milvus_uri = "{{inputs.parameters.milvus-uri}}"
        milvus_token = "{{inputs.parameters.milvus-token}}"
        retention_days = int("{{inputs.parameters.retention-days}}")
        
        connections.connect("default", uri=milvus_uri, token=milvus_token)
        
        # Get all collections
        all_collections = utility.list_collections()
        cutoff_date = datetime.now() - timedelta(days=retention_days)
        
        for col_name in all_collections:
            # Skip current active collections
            if col_name in ["movie_embeddings", "user_embeddings"]:
                continue
            
            # Extract timestamp from collection name (format: movie_embeddings_YYYYMMDDHHMMSS)
            match = re.search(r'_(\d{14})$', col_name)
            if match:
                timestamp_str = match.group(1)
                try:
                    col_date = datetime.strptime(timestamp_str, "%Y%m%d%H%M%S")
                    if col_date < cutoff_date:
                        print(f"Dropping old collection: {col_name}")
                        utility.drop_collection(col_name)
                except ValueError:
                    print(f"Could not parse timestamp from {col_name}")