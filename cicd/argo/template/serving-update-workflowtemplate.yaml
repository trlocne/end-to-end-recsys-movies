  # Template: Switch collections (blue-green)
  # Verifies the new movie collection is ready; user_collection is accepted as param
  # but not created by index-embeddings (only movie embeddings are indexed).
  - name: switch-collections
    inputs:
      parameters:
      - name: registry
        value: "trlocne204"
      - name: milvus-uri
      - name: milvus-token
      - name: movie-collection
      - name: user-collection
    script:
      image: "{{inputs.parameters.registry}}/indexing:latest"
      command: ["python"]
      source: |
        from pymilvus import connections, Collection, utility

        milvus_uri = "{{inputs.parameters.milvus-uri}}"
        milvus_token = "{{inputs.parameters.milvus-token}}"
        movie_collection = "{{inputs.parameters.movie-collection}}"

        connections.connect("default", uri=milvus_uri, token=milvus_token)

        if not utility.has_collection(movie_collection):
            raise RuntimeError(f"Collection {movie_collection} does not exist")

        col = Collection(movie_collection)
        col.load()
        num_entities = col.num_entities
        print(f"[INFO] Collection {movie_collection}: {num_entities} entities — ready")
        if num_entities == 0:
            raise RuntimeError(f"Collection {movie_collection} is empty")

        print(f"[INFO] switch-collections: movie collection switched to {movie_collection}")

