global:
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  group_by: [alertname, cluster, component]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: "null"   # tránh crash khi webhook chưa deploy

  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
    - match:
        severity: warning
      receiver: warning
      continue: true
    - match:
        component: serving
      receiver: ml-team
    - match:
        component: triton
      receiver: ml-team
    - match:
        component: feast
      receiver: ml-team

receivers:
  - name: "null"   # built-in Alertmanager receiver – không làm gì, không lỗi

  - name: default
    # TODO: thay bằng Slack/PagerDuty hoặc deploy webhook-receiver service
    webhook_configs:
      - url: http://webhook-receiver.monitoring.svc.cluster.local:8080/alerts
        send_resolved: true

  - name: critical
    # B?t khi c� Slack / email � di?n url v�o d�y:
    # slack_configs:
    #   - api_url: <SLACK_WEBHOOK_URL>
    #     channel: "#recsys-alerts-critical"
    #     title: "[CRITICAL] {{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
    webhook_configs:
      - url: http://webhook-receiver.monitoring.svc.cluster.local:8080/critical
        send_resolved: true

  - name: warning
    webhook_configs:
      - url: http://webhook-receiver.monitoring.svc.cluster.local:8080/warning
        send_resolved: true

  - name: ml-team
    webhook_configs:
      - url: http://webhook-receiver.monitoring.svc.cluster.local:8080/ml-alerts
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname, cluster, component]
