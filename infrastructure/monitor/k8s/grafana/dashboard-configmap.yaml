apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-recsys
  namespace: monitoring
  labels:
    grafana-dashboard: "true"
data:
  recsys-overview.json: |
    {
      "title": "RecSys Overview",
      "uid": "recsys-overview",
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Recommendation Requests/s",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 8 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "sum(rate(rec_requests_total[1m])) by (scenario)",
            "legendFormat": "{{ scenario }}"
          }]
        },
        {
          "id": 2,
          "title": "Serving p95 Latency (s)",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 8 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "histogram_quantile(0.95, rate(rec_latency_seconds_bucket[5m]))",
            "legendFormat": "p95 {{ scenario }}"
          }]
        },
        {
          "id": 3,
          "title": "Cache Hit Rate",
          "type": "gauge",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 8 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "rate(cache_hit_total[10m]) / (rate(cache_hit_total[10m]) + rate(cache_miss_total[10m]) + 0.001)",
            "legendFormat": "Hit Rate"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0, "max": 1,
              "thresholds": {
                "steps": [
                  { "value": 0, "color": "red" },
                  { "value": 0.3, "color": "yellow" },
                  { "value": 0.6, "color": "green" }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Feast Latency p95 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 8, "h": 8 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "histogram_quantile(0.95, rate(feast_latency_seconds_bucket[5m]))",
            "legendFormat": "Feast p95 {{ operation }}"
          }]
        },
        {
          "id": 5,
          "title": "Triton Inference Latency p95 (s)",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 8, "w": 8, "h": 8 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "histogram_quantile(0.95, rate(model_inference_latency_seconds_bucket[5m]))",
            "legendFormat": "Triton p95"
          }]
        },
        {
          "id": 6,
          "title": "Active Users / Items",
          "type": "stat",
          "gridPos": { "x": 16, "y": 8, "w": 8, "h": 8 },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "active_users_total",
              "legendFormat": "Users"
            },
            {
              "datasource": "Prometheus",
              "expr": "active_items_total",
              "legendFormat": "Items"
            }
          ]
        },
        {
          "id": 7,
          "title": "Feast Errors/s",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 6 },
          "targets": [{
            "datasource": "Prometheus",
            "expr": "rate(feast_errors_total[5m])",
            "legendFormat": "Feast errors {{ operation }}"
          }]
        },
        {
          "id": 8,
          "title": "Service Up/Down",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 6 },
          "targets": [
            { "datasource": "Prometheus", "expr": "up{job=\"recsys-serving\"}", "legendFormat": "Serving" },
            { "datasource": "Prometheus", "expr": "up{job=\"recsys-triton\"}", "legendFormat": "Triton" },
            { "datasource": "Prometheus", "expr": "up{job=\"mlflow\"}", "legendFormat": "MLflow" },
            { "datasource": "Prometheus", "expr": "up{job=\"argo-workflows\"}", "legendFormat": "Argo" }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ]
            }
          }
        }
      ]
    }
