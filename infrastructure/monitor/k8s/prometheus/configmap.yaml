apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s
      external_labels:
        cluster: "recsys"
        environment: "production"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      - job_name: loki
        static_configs:
          - targets: [loki.monitoring.svc.cluster.local:3100]

      - job_name: recsys-serving
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [serving]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: serving
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8000
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      - job_name: recsys-triton
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [serving]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: triton
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8002
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: mlflow
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [mlflow]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: mlflow
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:5000

      - job_name: argo-workflows
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [argo]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: argo-server
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9090

      - job_name: kafka
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [kafka]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: kafka
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9404

      # Node Exporter – CPU, RAM, disk metrics từ mỗi node (DaemonSet ns:monitoring)
      - job_name: node-exporter
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [monitoring]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: node-exporter
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:9100
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node

  alerts.yml: |
    groups:
      - name: recsys-serving
        interval: 30s
        rules:
          - alert: ServingHighLatency
            expr: histogram_quantile(0.95, rate(rec_latency_seconds_bucket[5m])) > 1.0
            for: 5m
            labels:
              severity: warning
              component: serving
            annotations:
              summary: "Serving API p95 latency cao"
              description: "p95 latency = {{ $value | humanizeDuration }} (scenario={{ $labels.scenario }})"

          - alert: ServingHighLatencyCritical
            expr: histogram_quantile(0.95, rate(rec_latency_seconds_bucket[5m])) > 3.0
            for: 2m
            labels:
              severity: critical
              component: serving
            annotations:
              summary: "Serving API p95 latency critical"
              description: "p95 latency = {{ $value | humanizeDuration }}"

          - alert: ServingDown
            expr: up{job="recsys-serving"} == 0
            for: 1m
            labels:
              severity: critical
              component: serving
            annotations:
              summary: "Serving API down"
              description: "Pod serving kh�ng scrape du?c metrics"

          - alert: LowCacheHitRate
            expr: |
              rate(cache_hit_total[10m])
              / (rate(cache_hit_total[10m]) + rate(cache_miss_total[10m]) + 0.001)
              < 0.3
            for: 10m
            labels:
              severity: warning
              component: serving
            annotations:
              summary: "Cache hit rate th?p du?i 30%"
              description: "Cache hit rate = {{ $value | humanizePercentage }}"

      - name: recsys-feast
        interval: 30s
        rules:
          - alert: FeastHighLatency
            expr: histogram_quantile(0.95, rate(feast_latency_seconds_bucket[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
              component: feast
            annotations:
              summary: "Feast online lookup ch?m"
              description: "p95 = {{ $value | humanizeDuration }} (operation={{ $labels.operation }})"

          - alert: FeastErrorRateHigh
            expr: rate(feast_errors_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
              component: feast
            annotations:
              summary: "Feast error rate cao"
              description: "{{ $value | humanize }} errors/s"

      - name: recsys-model
        interval: 30s
        rules:
          - alert: TritonHighLatency
            expr: histogram_quantile(0.95, rate(model_inference_latency_seconds_bucket[5m])) > 0.2
            for: 5m
            labels:
              severity: warning
              component: triton
            annotations:
              summary: "Triton p95 latency vu?t 200ms"
              description: "p95 = {{ $value | humanizeDuration }}"

          - alert: TritonDown
            expr: up{job="recsys-triton"} == 0
            for: 2m
            labels:
              severity: critical
              component: triton
            annotations:
              summary: "Triton Inference Server down"

      - name: recsys-infra
        interval: 30s
        rules:
          - alert: ArgoWorkflowFailed
            expr: argo_workflows_count{phase="Failed"} > 0
            for: 0m
            labels:
              severity: warning
              component: argo
            annotations:
              summary: "Argo workflow th?t b?i"
              description: "{{ $value }} workflow Failed"

          - alert: MLflowDown
            expr: up{job="mlflow"} == 0
            for: 3m
            labels:
              severity: warning
              component: mlflow
            annotations:
              summary: "MLflow server down"
