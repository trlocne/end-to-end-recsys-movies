apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recsys-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/trlocne/end-to-end-recsys-movies.git
    targetRevision: main
    path: deployments/k8s/monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
