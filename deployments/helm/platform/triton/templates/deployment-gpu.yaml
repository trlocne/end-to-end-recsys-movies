{{- if or (eq .Values.triton.mode "gpu") (eq .Values.triton.mode "both") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-server-gpu
  namespace: serving
  labels:
    app: triton-server
    component: inference
spec:
  revisionHistoryLimit: {{ .Values.triton.revisionHistoryLimit | default 2 }}
  replicas: 1
  selector:
    matchLabels:
      app: triton-server
  template:
    metadata:
      labels:
        app: triton-server
        component: inference
    spec:
      initContainers:
        - name: init-model-repo
          image: python:3.11-slim
          command: ["sh", "-c"]
          args:
            - |
              pip install --quiet boto3 pyyaml && python - <<'PYEOF'
              import os
              import boto3
              import yaml
              from botocore.exceptions import ClientError

              cfg_s3 = os.getenv("SERVING_CONFIG_S3", "")
              model_name = os.getenv("RERANKER_MODEL_NAME", "Recsys-ReRank")
              if not cfg_s3.startswith("s3://"):
                  raise SystemExit("SERVING_CONFIG_S3 must be an s3:// URL")

              parts = cfg_s3.replace("s3://", "").split("/", 1)
              bucket = parts[0]
              key = parts[1] if len(parts) > 1 else ""

              s3 = boto3.client("s3")
              cfg_obj = s3.get_object(Bucket=bucket, Key=key)
              config = yaml.safe_load(cfg_obj["Body"].read().decode("utf-8")) or {}
              reranker_version = str(config.get("models", {}).get("reranker_version", "")).strip()
              if reranker_version.lower().startswith("v"):
                  reranker_version = reranker_version[1:].strip()

              os.makedirs("/models/reranker/1", exist_ok=True)
              if not reranker_version:
                  print("[WARN] reranker_version missing in serving_config.yaml; skipping bootstrap ONNX download.")
                  raise SystemExit(0)

              config_dir = key.rsplit("/", 1)[0] if "/" in key else ""
              model_key = f"{config_dir}/{model_name}/v{reranker_version}/reranker.onnx".lstrip("/")
              dst = "/models/reranker/1/model.onnx"
              onnx_uri = f"s3://{bucket}/{model_key}"
              print(f"[INFO] ONNX bootstrap target: {onnx_uri}")
              try:
                  s3.download_file(bucket, model_key, dst)
              except ClientError as e:
                  code = e.response.get("Error", {}).get("Code", "")
                  if code in ("404", "NoSuchKey", "NotFound"):
                      raise SystemExit(
                          f"ONNX not found at {onnx_uri}. "
                          "Confirm Jenkins onnx_export uploaded reranker.onnx for this MLflow version; "
                          "check models.reranker_version and RERANKER_MODEL_NAME match the S3 prefix "
                          "under the serving_config.yaml folder."
                      )
                  raise
              print(f"[INFO] downloaded {onnx_uri} -> {dst}")
              data_key = model_key + ".data"
              try:
                  s3.head_object(Bucket=bucket, Key=data_key)
                  s3.download_file(bucket, data_key, dst + ".data")
                  print(f"[INFO] downloaded companion s3://{bucket}/{data_key}")
              except ClientError as e:
                  if e.response.get("Error", {}).get("Code") not in ("404", "NoSuchKey", "NotFound"):
                      raise

              models = config.get("models") or {}
              if models.get("reranker_input_dim") is not None:
                  feature_dim = int(models["reranker_input_dim"])
              elif models.get("reranker_feature_dim") is not None:
                  feature_dim = int(models["reranker_feature_dim"])
              else:
                  g_ed = int(models.get("gnn_embed_dim", 128))
                  feature_dim = 8 * g_ed + 32
              print(f"[INFO] reranker config.pbtxt input feature_dim={feature_dim}")
              L, R = chr(123), chr(125)
              inp_line = f'input [{L} name: "input" data_type: TYPE_FP32 dims: [ {feature_dim} ] {R}]'

              lines = [
                  'name: "reranker"',
                  'backend: "onnxruntime"',
                  'max_batch_size: 512',
                  inp_line,
                  'output [{ name: "output" data_type: TYPE_FP32 dims: [ 1 ] }]',
                  'dynamic_batching { preferred_batch_size: [ 32, 64, 128 ] max_queue_delay_microseconds: 500 }',
              ]
              with open("/models/reranker/config.pbtxt", "w") as f:
                  f.write("\n".join(lines) + "\n")
              print("[INFO] wrote /models/reranker/config.pbtxt (max_batch_size=512)")
              PYEOF
          volumeMounts:
            - name: model-repo
              mountPath: /models
          env:
            - name: SERVING_CONFIG_S3
              value: {{ .Values.triton.servingConfigS3 | quote }}
            - name: RERANKER_MODEL_NAME
              value: {{ .Values.triton.rerankerModelName | quote }}
          envFrom:
            - secretRef: { name: aws-creds }
      containers:
        - name: triton
          image: {{ .Values.triton.gpu.image | quote }}
          args:
            - tritonserver
            - --model-repository=/models
            - --model-control-mode=explicit
            - --load-model=reranker
            - --allow-http=true
            - --http-port=8002
            - --grpc-port=8001
            - --metrics-port=8000
          ports:
            - name: http
              containerPort: 8002
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8000
          volumeMounts:
            - name: model-repo
              mountPath: /models
          resources:
            {{- toYaml .Values.triton.gpu.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: model-repo
          emptyDir: {}
{{- end }}
