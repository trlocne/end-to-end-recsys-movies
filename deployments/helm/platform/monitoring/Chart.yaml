apiVersion: v2
name: recsys-monitoring
description: Monitoring stack — Prometheus + Grafana + Alertmanager + node-exporter (kube-prometheus-stack) + Loki + Grafana Alloy
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: kube-prometheus-stack
    version: 61.3.2
    repository: https://prometheus-community.github.io/helm-charts
    condition: kube-prometheus-stack.enabled

  - name: loki
    version: 6.6.2
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled

  - name: alloy
    version: 0.9.1
    repository: https://grafana.github.io/helm-charts
    condition: alloy.enabled

  - name: tempo
    version: 1.10.3
    repository: https://grafana.github.io/helm-charts
    condition: tempo.enabled
