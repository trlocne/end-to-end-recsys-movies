{{- if .Values.rayPlugin.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ray-executor-plugin
  labels:
    workflows.argoproj.io/configmap-type: ExecutorPlugin
data:
  sidecar.automountServiceAccountToken: "true"
  sidecar.container: |
    command:
    - argo-ray-plugin
    image: {{ .Values.rayPlugin.image }}
    name: argo-ray-plugin
    ports:
    - containerPort: 3028
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 250m
        memory: 64Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
{{- end }}
