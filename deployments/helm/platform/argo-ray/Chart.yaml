apiVersion: v2
name: recsys-argo-ray
description: Helm chart for Argo Workflows + KubeRay operator + Ray executor plugin
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: argo-workflows
    version: 1.0.8
    repository: https://argoproj.github.io/argo-helm
    condition: argo-workflows.enabled
  - name: kuberay-operator
    version: 1.6.0
    repository: https://ray-project.github.io/kuberay-helm/
    condition: kuberay-operator.enabled
