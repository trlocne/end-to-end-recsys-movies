# Optional — chỉ cần nếu Jenkins kubectl apply CR kiểu argoproj.io/Application (Argo CD).
# Chỉ deploy serving bằng Deployment thường → dùng jenkins-recsys-serving-deploy.yaml, không cần file này.
#
# Read-only CRD access so kubectl apply can validate kinds such as argoproj.io/Application.
# Apply as cluster admin (safe with any namespace layout):
#   kubectl apply -f deployments/k8s/rbac/jenkins-kubectl-crd-readonly.yaml
#
# ServiceAccount: change subjects if Jenkins agents do not use jenkins/default.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-kubectl-crd-readonly
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-kubectl-crd-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jenkins-kubectl-crd-readonly
subjects:
  - kind: ServiceAccount
    name: default
    namespace: jenkins
