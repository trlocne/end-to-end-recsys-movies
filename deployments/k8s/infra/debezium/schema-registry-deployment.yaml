apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-reg
  template:
    metadata:
      labels:
        app: schema-reg
    spec:
      containers:
      - name: schema-registry
        image: confluentinc/cp-schema-registry:7.7.0
        ports:
        - containerPort: 8081
        env:
        - name: SCHEMA_REGISTRY_HOST_NAME
          value: schema-registry
        - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
          value: "PLAINTEXT://kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
        - name: SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL
          value: PLAINTEXT
        - name: SCHEMA_REGISTRY_LISTENERS
          value: "http://0.0.0.0:8081"
        - name: SCHEMA_REGISTRY_DEBUG
          value: "true"
        readinessProbe:
          httpGet:
            path: /subjects
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 20
        livenessProbe:
          httpGet:
            path: /subjects
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 20
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: schema-reg
  namespace: infra
spec:
  selector:
    app: schema-reg
  ports:
  - name: http
    port: 8081
    targetPort: 8081
