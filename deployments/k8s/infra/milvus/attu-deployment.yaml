apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-attu
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: milvus-attu
  template:
    metadata:
      labels:
        app: milvus-attu
    spec:
      containers:
      - name: attu
        image: zilliz/attu:latest
        ports:
        - containerPort: 3000
        env:
        - name: MILVUS_URL
          value: milvus-standalone:19530
---
apiVersion: v1
kind: Service
metadata:
  name: milvus-attu
  namespace: infra
spec:
  selector:
    app: milvus-attu
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  type: ClusterIP
