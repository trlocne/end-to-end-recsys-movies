apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: infra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-role
  namespace: infra
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-role-binding
  namespace: infra
subjects:
  - kind: ServiceAccount
    name: flink
    namespace: infra
roleRef:
  kind: Role
  name: flink-role
  apiGroup: rbac.authorization.k8s.io