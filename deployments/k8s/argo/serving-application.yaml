
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: recsys-serving
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/trlocne/end-to-end-recommendation-system.git
    targetRevision: main
    path: deployments/k8s/services/serving
  destination:
    server: https://kubernetes.default.svc
    namespace: serving
  syncPolicy:
    syncOptions:
      - CreateNamespace=true